services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=user:password@tcp(mysql:3306)/mydb?parseTime=true
      - JWT_SECRET=local-dev-secret-key-32chars-min!!
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-dummy}
      - SUPABASE_STORAGE_BUCKET=${SUPABASE_STORAGE_BUCKET:-image}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: